<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      font-family: 'Segoe UI', sans-serif;
      padding: 16px;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
    }
    h2 {
      margin: 0 0 14px;
      font-size: 16px;
      color: #00d4aa;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label {
      font-size: 12px;
      color: #aaa;
      display: block;
      margin-bottom: 4px;
    }
    input[type="password"], input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a4a;
      color: #eee;
      font-size: 13px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    input:focus {
      outline: none;
      border-color: #00d4aa;
    }
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    button {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    #btnStart  { background: #00d4aa; color: #000; }
    #btnStop   { background: #e74c3c; color: #fff; }
    #btnStop:disabled, #btnStart:disabled { opacity: 0.4; cursor: not-allowed; }
    #status {
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #2a2a4a;
      color: #aaa;
      min-height: 20px;
      word-break: break-word;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      display: inline-block;
      margin-right: 6px;
    }
    .dot.live { background: #e74c3c; animation: pulse 1s infinite; }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.3; }
    }
  </style>
</head>
<body>
  <h2>🏏 Cricket Commentary</h2>

  <label>Anthropic API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." />

  <label>Capture interval (seconds)</label>
  <input type="number" id="interval" value="4" min="2" max="15" />

  <div class="row">
    <button id="btnStart">▶ Start</button>
    <button id="btnStop" disabled>⏹ Stop</button>
  </div>

  <div id="status"><span class="dot" id="dot"></span><span id="statusText">Ready — enter your API key and press Start</span></div>

  <script src="popup.js"></script>
</body>
</html>
